<!DOCTYPE html>
<html lang="en">
<head>
    <title>Result</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #0f172a;
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .result { 
            margin-top: 80px;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 440px;
            width: 100%;
        }
        h2 { color: #38bdf8; margin-bottom: 5px; }
        .mode-badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(56,189,248,0.15);
            color: #38bdf8;
            border: 1px solid rgba(56,189,248,0.3);
            margin-bottom: 20px;
        }
        .result-label {
            font-size: 20px;
            font-weight: 700;
            margin: 10px 0 5px;
        }
        .score {
            font-size: 44px;
            font-weight: 900;
            margin: 8px 0 20px;
        }
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        .btn-row a {
            flex: 1;
            display: inline-block;
            background: #1e293b;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-row a:hover { background: #38bdf8; color: #0f172a; }
        #preview {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            border: 2px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="result">
    <h2>Prediction Result</h2>
    <div class="mode-badge" id="modeBadge">—</div>

    <p style="color:#94a3b8; font-size:16px; margin:0;">
        <strong>Result:</strong>
    </p>
    <div class="result-label" id="labelOut">Calculating...</div>
    <div class="score"        id="confOut">--%</div>

    <img id="preview" />

    <div class="btn-row">
        <a href="upload.html">← Scan Again</a>
        <a href="index.html">🏠 Home</a>
    </div>
</div>

<script>
    const raw = localStorage.getItem("predData");
    if (!raw) {
        window.location.replace("upload.html");
    } else {
        const data  = JSON.parse(raw);
        const label = data.label || "";
        const mode  = data.mode  || "mask";

        // Mode badge
        document.getElementById("modeBadge").innerText =
            mode === "plant" ? "🌿 Plant Disease Detection" : "😷 Face Mask Detection";

        // Label
        document.getElementById("labelOut").innerText = label;

        // Danger = bad outcome
        // mask:  "Without Mask" is danger
        // plant: "Diseased -..." is danger
        const isDanger = mode === "plant"
            ? label.toLowerCase().startsWith("diseased")
            : label.toLowerCase().includes("without");

        const color = isDanger ? "#ef4444" : "#10b981";
        document.getElementById("labelOut").style.color = color;
        document.getElementById("confOut").style.color  = color;
        document.getElementById("confOut").innerText    = (data.confidence * 100).toFixed(1) + "%";

        if (data.image) {
            const img = document.getElementById("preview");
            img.src = "data:image/jpeg;base64," + data.image;
            img.style.display = "block";
        }
    }
</script>

</body>
</html>
