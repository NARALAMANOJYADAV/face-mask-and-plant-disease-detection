<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        :root {
            --bg: #0f172a; --surface: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8; --success: #10b981; --danger: #ef4444;
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: linear-gradient(135deg, #020617, var(--bg));
            color: var(--text-main); margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 900px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
        }
        .header h1 { color: var(--primary); margin: 0; }
        .back-btn {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px; border-radius: 8px; text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        .dash-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--surface); padding: 25px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .stat-title { color: var(--text-muted); font-size: 14px; text-transform: uppercase; font-weight: bold; }
        .stat-value { font-size: 36px; font-weight: 900; margin-top: 10px; }
        
        /* Bar Chart */
        .chart-box {
            background: var(--surface); padding: 30px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px;
        }
        .bar-wrap { width: 100%; background: #1e293b; height: 30px; border-radius: 30px; overflow: hidden; display: flex; margin-top: 15px; }
        .bar-safe { background: var(--success); height: 100%; transition: width 1s ease-in-out; }
        .bar-danger { background: var(--danger); height: 100%; transition: width 1s ease-in-out; }
        
        /* Data Table */
        .table-wrap {
            background: var(--surface); padding: 30px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .badge {
            padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;
        }
        .badge-mask { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.4); }
        .badge-nomask { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Admin Control Panel</h1>
        <a href="index.html" class="back-btn">← Back Home</a>
    </div>

    <div class="dash-grid">
        <div class="stat-card">
            <div class="stat-title">Total Scans</div>
            <div class="stat-value" id="valTotal">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Safes (Masked)</div>
            <div class="stat-value" id="valMask" style="color: var(--success);">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Violations</div>
            <div class="stat-value" id="valNoMask" style="color: var(--danger);">0</div>
        </div>
    </div>
    
    <div class="chart-box">
        <h2 style="margin:0 0 10px 0; font-size: 18px;">Global Compliance Ratio</h2>
        <p style="margin:0; color: var(--text-muted); font-size: 14px;">Distribution of masked vs unmasked individuals.</p>
        <div class="bar-wrap">
            <div class="bar-safe" id="barSafe" style="width: 50%;"></div>
            <div class="bar-danger" id="barDanger" style="width: 50%;"></div>
        </div>
        <div style="display:flex; justify-content: space-between; margin-top: 10px; font-weight:bold; font-size: 12px;">
            <span style="color:var(--success)" id="labelSafe">50% Masked</span>
            <span style="color:var(--danger)" id="labelDanger">50% Exposed</span>
        </div>
    </div>

    <div class="table-wrap">
        <h2 style="margin:0 0 20px 0; font-size: 18px;">Recent Live Logs</h2>
        <table>
            <thead>
                <tr>
                    <th>Scan ID</th>
                    <th>Result</th>
                    <th>AI Confidence</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Dynamically populated -->
            </tbody>
        </table>
    </div>
</div>

<script>
    function loadAdminData() {
        // Load the actual history we just generated in upload.html
        let history = JSON.parse(localStorage.getItem("scanHistory") || "[]");
        
        let maskCount = 0;
        let noMaskCount = 0;
        
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        
        if (history.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#94a3b8;'>No scans performed yet. Go upload an image!</td></tr>";
        }

        history.forEach(scan => {
            let labelLower = scan.label.toLowerCase();
            let isDanger = labelLower.includes("without") || labelLower.includes("detect") || labelLower.includes("blight") || labelLower.includes("rust") || labelLower.includes("disease");
            
            if (isDanger) noMaskCount++;
            else maskCount++;
            
            let row = document.createElement("tr");
            
            let badgeClass = isDanger ? "badge badge-nomask" : "badge badge-mask";
            
            row.innerHTML = `
                <td style="color:#94a3b8;">#${scan.id}</td>
                <td><span class="${badgeClass}">${scan.label}</span></td>
                <td><strong>${(scan.confidence * 100).toFixed(1)}%</strong></td>
                <td style="font-size:12px; color:#94a3b8;">${scan.time}</td>
            `;
            tbody.appendChild(row);
        });
        
        // Update Stats
        document.getElementById("valTotal").innerText = history.length;
        document.getElementById("valMask").innerText = maskCount;
        document.getElementById("valNoMask").innerText = noMaskCount;
        
        // Update Chart
        let safeRatio = history.length > 0 ? (maskCount / history.length) * 100 : 50;
        let dangerRatio = history.length > 0 ? (noMaskCount / history.length) * 100 : 50;
        
        document.getElementById("barSafe").style.width = safeRatio + "%";
        document.getElementById("barDanger").style.width = dangerRatio + "%";
        
        document.getElementById("labelSafe").innerText = safeRatio.toFixed(1) + "% Masked";
        document.getElementById("labelDanger").innerText = dangerRatio.toFixed(1) + "% Exposed";
    }
    
    // Run on load
    loadAdminData();
</script>

</body>
</html>
