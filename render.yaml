services:
  - type: web
    name: face-mask-plant-disease-detection
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false        # you will set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
