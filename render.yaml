services:
  - type: web
    name: face-mask-plant-disease-detection
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard (use Internal Database URL)
      - key: PYTHON_VERSION
        value: "3.11"
